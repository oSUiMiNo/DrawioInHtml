<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Drawio 拡張機能のみ動作確認</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 16px; }
</style>
</head>
<body>

<h1>Drawio in HTML — 拡張機能のみ動作確認</h1>

<p>
  自前ホスト div / CDN viewer / 自前マウントスクリプトを<strong>すべて取り除いた</strong>最小ケース。
  拡張機能 v0.5.0 が <code>&lt;script type="application/xml" id="X"&gt;</code> 1つだけから描画できるかの確認用。
</p>

<p>
  この HTML をブラウザで直接開いても何も描画されません（拡張機能専用）。
</p>

<h2>図1</h2>

<script type="application/xml" id="fig1">
<mxGraphModel>
  <root>
    <mxCell id="0"/>
    <mxCell id="1" parent="0"/>
    <mxCell id="2" value="Hello Drawio" style="rounded=0;whiteSpace=wrap;html=1;fillColor=#dae8fc;strokeColor=#6c8ebf;" vertex="1" parent="1">
      <mxGeometry x="40" y="40" width="160" height="60" as="geometry"/>
    </mxCell>
  </root>
</mxGraphModel>
</script>

</body>
</html>
