<h1 id="sec-render">Sample</h1>

<h2>How to Embed Draw.io</h2>

<p>You can embed it by writing it normally as shown below.</p>


<div id="diagram-volume" class="drawio-host"></div>
<script type="application/xml" id="drawio-volume-xml">
<mxfile host="embed.diagrams.net">
  <diagram name="VolumeProfile" id="volumeprofile">
    <mxGraphModel dx="499" dy="1361" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1080" pageHeight="560" math="0" shadow="0">
      <root>
        <mxCell id="0" />
        <mxCell id="1" parent="0" />
        <mxCell id="EVG" edge="1" parent="1" source="VG" style="endArrow=classic;html=1;strokeColor=#9aa3ad;strokeWidth=2;fontColor=#9aa3ad;fontSize=12;edgeStyle=orthogonalEdgeStyle;rounded=1;entryX=0;entryY=0.5;entryDx=0;entryDy=0;exitX=1;exitY=0.5;exitDx=0;exitDy=0;" target="MC" value="">
          <mxGeometry relative="1" as="geometry">
            <Array as="points" />
            <mxPoint x="280" y="148.72" as="sourcePoint" />
            <mxPoint x="440" y="308.72" as="targetPoint" />
          </mxGeometry>
        </mxCell>
        <mxCell id="VG" parent="1" style="rounded=1;arcSize=12;fillColor=#181c22;strokeColor=#7fd1a0;strokeWidth=2;fontColor=#e7eaef;fontSize=14;align=center;verticalAlign=middle;html=1;whiteSpace=wrap;" value="&lt;b&gt;A&lt;/b&gt;" vertex="1">
          <mxGeometry height="97.44" width="160" x="60" y="111.28" as="geometry" />
        </mxCell>
        <mxCell id="MC" parent="1" style="rounded=1;arcSize=12;fillColor=#1e242c;strokeColor=#7da6ff;strokeWidth=2;fontColor=#e7eaef;fontSize=14;align=center;verticalAlign=middle;html=1;whiteSpace=wrap;" value="&lt;b&gt;B&lt;/b&gt;" vertex="1">
          <mxGeometry height="100" width="160" x="280" y="110" as="geometry" />
        </mxCell>
      </root>
    </mxGraphModel>
  </diagram>
</mxfile>

</script>
