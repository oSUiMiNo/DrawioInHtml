<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>&lt; を含むラベルの最小再現</title></head>
<body>
<h1>&lt; を含むラベル — 最小再現テスト</h1>
<p>label に <code>&lt;button&gt;</code> のような文字を含むケース。Drawio が保存時に <code>&amp;lt;</code> <code>&amp;gt;</code> でエスケープして書き出した結果を再現する。</p>

<script type="application/drawio+xml" data-diagram-id="lt-label">
<mxfile host="embed.diagrams.net">
  <diagram id="d1" name="lt-test">
    <mxGraphModel dx="800" dy="600" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="850" pageHeight="500" math="0" shadow="0">
      <root>
        <mxCell id="0" />
        <mxCell id="1" parent="0" />
        <mxCell id="2" parent="1" style="rounded=0;whiteSpace=wrap;html=1;" value="&lt;button&gt; を押す" vertex="1">
          <mxGeometry height="60" width="160" x="80" y="80" as="geometry" />
        </mxCell>
        <mxCell id="3" parent="1" style="rounded=0;whiteSpace=wrap;html=1;" value="if (a &amp;lt; b)" vertex="1">
          <mxGeometry height="60" width="160" x="80" y="180" as="geometry" />
        </mxCell>
        <mxCell id="4" parent="1" style="rounded=0;whiteSpace=wrap;html=1;" value="名前&#10;value=&amp;quot;foo&amp;quot;" vertex="1">
          <mxGeometry height="60" width="160" x="80" y="280" as="geometry" />
        </mxCell>
      </root>
    </mxGraphModel>
  </diagram>
</mxfile>
</script>

</body>
</html>
