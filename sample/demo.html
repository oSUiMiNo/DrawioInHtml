<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Drawio埋め込みサンプル</title>
</head>
<body>
<h1>Drawio埋め込みサンプル</h1>
<p>このHTMLには2つのDrawio図がscriptタグとして埋め込まれている。</p>

<h2>図1: 簡単なノード</h2>
<script type="application/drawio+xml" data-diagram-id="fig1">
<mxfile host="embed.diagrams.net">
  <diagram id="RQKdoX4chdWe7C5CBxcM" name="ページ-1">
    <mxGraphModel dx="747" dy="3537" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="850" pageHeight="1100" math="0" shadow="0">
      <root>
        <mxCell id="0" />
        <mxCell id="1" parent="0" />
        <mxCell id="6" edge="1" parent="1" source="2" style="edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;exitX=1;exitY=0.5;exitDx=0;exitDy=0;">
          <mxGeometry relative="1" as="geometry">
            <mxPoint x="790" y="420" as="targetPoint" />
          </mxGeometry>
        </mxCell>
        <mxCell id="7" edge="1" parent="1" source="2" style="edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;html=1;exitX=0.5;exitY=0;exitDx=0;exitDy=0;">
          <mxGeometry relative="1" as="geometry">
            <mxPoint x="610" y="450" as="targetPoint" />
          </mxGeometry>
        </mxCell>
        <mxCell id="2" parent="1" style="rounded=0;whiteSpace=wrap;html=1;" value="Hello　Edit　2" vertex="1">
          <mxGeometry height="60" width="120" x="490" y="440" as="geometry" />
        </mxCell>
        <mxCell id="3" parent="1" style="rounded=0;whiteSpace=wrap;html=1;" value="d" vertex="1">
          <mxGeometry height="60" width="120" x="580" y="550" as="geometry" />
        </mxCell>
        <mxCell id="4" parent="1" style="shape=note;whiteSpace=wrap;html=1;backgroundOutline=1;fontColor=#000000;darkOpacity=0.05;fillColor=#FFF9B2;strokeColor=none;fillStyle=solid;direction=west;gradientDirection=north;gradientColor=#FFF2A1;shadow=1;size=20;autosizeText=1;" value="" vertex="1">
          <mxGeometry height="160" width="160" x="590" y="780" as="geometry" />
        </mxCell>
        <mxCell id="5" parent="1" style="shape=note;whiteSpace=wrap;html=1;backgroundOutline=1;fontColor=#000000;darkOpacity=0.05;fillColor=#FFF9B2;strokeColor=none;fillStyle=solid;direction=west;gradientDirection=north;gradientColor=#FFF2A1;shadow=1;size=20;autosizeText=1;" value="" vertex="1">
          <mxGeometry height="160" width="160" x="1420" y="440" as="geometry" />
        </mxCell>
      </root>
    </mxGraphModel>
  </diagram>
</mxfile>

</script>

<h2>図2: 空の図</h2>
<script type="application/drawio+xml" data-diagram-id="fig2">
<mxGraphModel dx="800" dy="600" grid="1" gridSize="10" page="1" pageScale="1" pageWidth="850" pageHeight="1100">
  <root>
    <mxCell id="0" />
    <mxCell id="1" parent="0" />
  </root>
</mxGraphModel>
</script>

</body>
</html>
